services:
  llama-cpp:
    image: ${LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    container_name: helpy-llama-cpp
    restart: unless-stopped
    ports:
      - "${LLAMA_PORT:-8080}:8080"
    volumes:
      - "${LLAMA_MODEL_DIR:-/home/shingen/AI_Core/models}:/models:ro"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/${LLAMA_MODEL_FILE:-Qwen3.6-35B-A3B-UD-IQ2_M.gguf}
      - --ctx-size
      - "${LLAMA_CTX_SIZE:-32768}"
      - --n-gpu-layers
      - "${LLAMA_GPU_LAYERS:-999}"
      - --parallel
      - "${LLAMA_PARALLEL:-1}"
      - --jinja
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/v1/models"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s

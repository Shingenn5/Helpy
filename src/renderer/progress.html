<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starting...</title>
  <style>
    @font-face {
      font-family: 'Inter';
      src: url('./src/fonts/Inter.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
  </style>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      padding: 32px;
      background: transparent;
      color: #eef4f8;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
      -webkit-app-region: drag;
    }

    .container {
      position: relative;
      background:
        linear-gradient(135deg, rgba(55, 166, 167, 0.18), transparent 38%),
        linear-gradient(315deg, rgba(119, 183, 255, 0.13), transparent 44%),
        #0d1017;
      border: 1px solid #35506b;
      border-radius: 18px;
      padding: 30px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      -webkit-app-region: no-drag;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.75), rgba(0,0,0,0));
      border-radius: 18px;
      pointer-events: none;
      z-index: 1;
    }

    #splash-video {
      display: none;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
      position: relative;
      z-index: 2;
    }

    .brand-icon {
      width: 78px;
      height: 78px;
      border-radius: 20px;
      box-shadow: 0 14px 36px rgba(55, 166, 167, 0.25);
    }

    .brand-name {
      font-size: 26px;
      font-weight: 700;
      color: #eef4f8;
      letter-spacing: 0;
    }

    .brand-kicker {
      color: #77b7ff;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
      opacity: 0.9;
    }

    .detail {
      font-size: 13px;
      font-weight: 400;
      /*color: #999ba3;*/
      text-align: center;
      min-height: 20px;
      margin-bottom: 28px;
      position: relative;
      z-index: 2;
      color: #a6b4c2;
    }

    .detail-text {
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .completed .detail {
      color: #22c55edd;
    }

    .progress-container {
      width: 100%;
      height: 2px;
      background: #202b3c;
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }

    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, #37a6a7, #77b7ff);
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    .progress-indeterminate {
      width: 40%;
      animation: indeterminate-slide 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes indeterminate-slide {
      0% {
        left: -40%;
        right: 100%;
      }
      60% {
        left: 100%;
        right: -40%;
      }
      100% {
        left: 100%;
        right: -40%;
      }
    }

    .completed .progress-bar {
      width: 100% !important;
      animation: none;
      background: #22c55e;
    }

    .log-line {
      width: 100%;
      font-size: 11px;
      /*color: #7b7d86;*/
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'JetBrainsMono', 'GoogleSansCode', monospace;
      text-align: center;
      opacity: 0.8;
      min-height: 16px;
      transition: opacity 0.3s ease;
      position: relative;
      z-index: 2;
    }

    .log-line:not(:empty) {
      opacity: 1;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(4px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .completed .detail {
      color: #64d6d1;
    }
  </style>
</head>
<body>
  <div class="container">
    <video id="splash-video" autoplay muted loop></video>
    <div class="brand">
      <div class="brand-icon-wrapper">
        <img class="brand-icon" id="brand-icon" src="" alt="Helpy">
      </div>
      <span class="brand-kicker">local agent workstation</span>
      <span class="brand-name">Helpy</span>
    </div>

    <div class="detail">
      <span class="detail-text" id="detail-text">Initializing...</span>
    </div>

    <div class="progress-container">
      <div class="progress-bar progress-indeterminate" id="progress-bar"></div>
    </div>

    <div class="log-line" id="log-line"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    ipcRenderer.on('set-icon-path', (_, iconPath) => {
      document.getElementById('brand-icon').src = iconPath;
    });

    ipcRenderer.on('set-splash-image', (_, imagePath) => {
      // old video hook, left around so startup doesn't care
    });

    ipcRenderer.on('set-title', (_, title) => {
      // Title is no longer displayed, but keep handler for compatibility
    });

    ipcRenderer.on('set-detail', (_, value) => {
      const detailTextEl = document.getElementById('detail-text');

      // Trigger fade-in animation by removing and re-adding the element
      detailTextEl.style.animation = 'none';
      setTimeout(() => {
        detailTextEl.textContent = value;
        detailTextEl.style.animation = 'fadeIn 0.4s ease forwards';
      }, 10);
    });

    ipcRenderer.on('set-completed', () => {
      document.body.classList.add('completed');
      const progressBar = document.getElementById('progress-bar');
      progressBar.classList.remove('progress-indeterminate');
    });

    const logLine = document.getElementById('log-line');

    ipcRenderer.on('add-log', (_, message) => {
      logLine.textContent = message;
    });
  </script>
</body>
</html>
